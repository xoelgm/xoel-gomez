<section class="min-h-screen flex items-center justify-center bg-white relative overflow-hidden">
  <!-- Intro "X" -->
  <div
    class="absolute inset-0 flex items-center justify-center bg-white z-50 transition-opacity duration-700"
    [ngClass]="{ 'opacity-0 pointer-events-none': !showIntro }"
  >
    <h1
      class="text-7xl sm:text-9xl font-extrabold text-cyan-400"
      [ngClass]="{ 'animate-bounceX': showBounce }"
    >
      X
    </h1>
  </div>

  <!-- Contenido principal -->
  <div
    class="text-center max-w-3xl text-gray-900 transition-opacity duration-1000 delay-300"
    [ngClass]="{ 'opacity-0': !contentVisible, 'opacity-100': contentVisible }"
  >
    <h1 class="text-3xl sm:text-5xl font-bold mb-4">
      {{ 'home.greeting' | translate }} <span class="text-cyan-400">Xoel</span>
    </h1>
    <h2 class="text-lg sm:text-2xl text-gray-700 mb-6">
      {{ 'home.subtitle' | translate }}
    </h2>
    <p class="text-base sm:text-lg text-gray-600 mb-8">
      {{ 'home.description' | translate }}
    </p>
    <a href="#contact"
       class="inline-block bg-cyan-400 hover:bg-cyan-500 text-white font-semibold px-6 py-3 rounded-xl transition duration-300">
       {{ 'home.cta' | translate }}
    </a>
  </div>
</section>
