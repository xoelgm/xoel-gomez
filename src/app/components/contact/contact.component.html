<section class="min-h-screen bg-gray-100 text-gray-900 px-4 sm:px-6 py-12 sm:py-20" id="contact">
  <div class="max-w-3xl mx-auto">
    <h2 class="text-3xl sm:text-4xl font-bold text-center mb-8 sm:mb-10 text-cyan-400">{{ 'contact.title' | translate }}</h2>

    <form (ngSubmit)="sendEmail(contactForm)" #contactForm="ngForm" class="bg-white p-6 sm:p-8 rounded-2xl shadow-xl space-y-5 sm:space-y-6">
      <div>
        <label for="name" class="block font-bold mb-2 text-cyan-400">{{ 'contact.name' | translate }}</label>
        <input type="text" id="name" name="name" class="w-full p-3 rounded-lg bg-white border border-gray-300 text-gray-900" placeholder="{{ 'contact.name_placeholder' | translate }}" ngModel required />
      </div>

      <div>
        <label for="email" class="block font-bold mb-2 text-cyan-400">{{ 'contact.email' | translate }}</label>
        <input type="email" id="email" name="email" class="w-full p-3 rounded-lg bg-white border border-gray-300 text-gray-900" placeholder="{{ 'contact.email_placeholder' | translate }}" ngModel required />
      </div>

      <div>
        <label for="message" class="block font-bold mb-2 text-cyan-400">{{ 'contact.message' | translate }}</label>
        <textarea id="message" name="message" rows="5" class="w-full p-3 rounded-lg bg-white border border-gray-300 text-gray-900" placeholder="{{ 'contact.message_placeholder' | translate }}" ngModel required></textarea>
      </div>

      <button type="submit" class="w-full sm:w-auto bg-cyan-400 text-white font-semibold px-6 py-3 rounded-xl hover:bg-cyan-500 transition">
        {{ 'contact.submit' | translate }}
      </button>
    </form>
  </div>
</section>
